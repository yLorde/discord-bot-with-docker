services:
  postgres:
    image: postgres:18
    container_name: discord-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-db_admin}
      POSTGRES_USER: ${POSTGRES_USER:-user_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-user_password123}
      POSTGRES_PORT: 5437
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - 5437:5437
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./configs/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./configs/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5437 -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - discord-bot-network
  app:
    build: .
    container_name: discord-bot-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-user_admin}:${POSTGRES_PASSWORD:-user_password123}@postgres:5437/${POSTGRES_DB:-db_admin}
      DB_HOST: postgres
      DB_PORT: 5437
      DB_USER: ${POSTGRES_USER:-user_admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-user_password123}
      DB_NAME: ${POSTGRES_DB:-db_admin}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - discord-bot-network
networks:
  discord-bot-network:
    driver: bridge
volumes:
  postgres-data:
